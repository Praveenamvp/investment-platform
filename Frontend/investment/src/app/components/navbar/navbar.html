<nav class="navbar" [class.scrolled]="isScrolled">
  <div class="nav-inner">
    <!-- Brand -->
    <a routerLink="/dashboard" class="nav-brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
          <path
            d="M4 20L10 12L16 16L22 6"
            stroke="#059669"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <circle cx="22" cy="6" r="2.5" fill="#059669" />
        </svg>
      </div>
      <span class="brand-name">InvestIQ</span>
    </a>

    <!-- Desktop links -->
    <ul class="nav-links">
      <li *ngFor="let link of navLinks">
        <a [routerLink]="link.route" routerLinkActive="active" class="nav-link">
          <!-- Grid icon -->
          <svg *ngIf="link.icon === 'grid'" width="15" height="15" viewBox="0 0 16 16" fill="none">
            <rect
              x="1"
              y="1"
              width="6"
              height="6"
              rx="1.5"
              stroke="currentColor"
              stroke-width="1.4"
            />
            <rect
              x="9"
              y="1"
              width="6"
              height="6"
              rx="1.5"
              stroke="currentColor"
              stroke-width="1.4"
            />
            <rect
              x="1"
              y="9"
              width="6"
              height="6"
              rx="1.5"
              stroke="currentColor"
              stroke-width="1.4"
            />
            <rect
              x="9"
              y="9"
              width="6"
              height="6"
              rx="1.5"
              stroke="currentColor"
              stroke-width="1.4"
            />
          </svg>
          <!-- Trending icon -->
          <svg
            *ngIf="link.icon === 'trending'"
            width="15"
            height="15"
            viewBox="0 0 16 16"
            fill="none"
          >
            <path
              d="M1 11L5 7L8 9.5L12 4L15 1"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M12 1h3v3"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <!-- Pie icon -->
          <svg *ngIf="link.icon === 'pie'" width="15" height="15" viewBox="0 0 16 16" fill="none">
            <path d="M8 2a6 6 0 100 12A6 6 0 008 2z" stroke="currentColor" stroke-width="1.4" />
            <path d="M8 2v6h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
          </svg>
          <!-- Briefcase icon -->
          <svg
            *ngIf="link.icon === 'briefcase'"
            width="15"
            height="15"
            viewBox="0 0 16 16"
            fill="none"
          >
            <rect
              x="1"
              y="5"
              width="14"
              height="9"
              rx="1.5"
              stroke="currentColor"
              stroke-width="1.4"
            />
            <path
              d="M5 5V4a2 2 0 014 0v1"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linecap="round"
            />
            <path d="M1 9h14" stroke="currentColor" stroke-width="1.4" />
          </svg>
          {{ link.label }}
        </a>
      </li>
    </ul>

    <!-- Right: profile + mobile toggle -->
    <div class="nav-right">
      <!-- Profile dropdown -->
      <div class="profile-menu" (click)="isProfileOpen = !isProfileOpen">
        <div class="avatar">{{ userInitials }}</div>
        <span class="user-name">{{ userName }}</span>
        <svg
          class="chevron"
          [class.open]="isProfileOpen"
          width="12"
          height="12"
          viewBox="0 0 12 12"
          fill="none"
        >
          <path
            d="M3 4.5l3 3 3-3"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>

        <!-- Dropdown -->
        <div class="dropdown" [class.visible]="isProfileOpen" (click)="$event.stopPropagation()">
          <div class="dropdown-header">
            <div class="avatar avatar-lg">{{ userInitials }}</div>
            <div>
              <div class="dropdown-name">{{ userName }}</div>
              <div class="dropdown-role">Investor</div>
            </div>
          </div>
          <div class="dropdown-divider"></div>
          <a routerLink="/portfolio" class="dropdown-item">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <rect
                x="1"
                y="5"
                width="14"
                height="9"
                rx="1.5"
                stroke="currentColor"
                stroke-width="1.4"
              />
              <path
                d="M5 5V4a2 2 0 014 0v1M1 9h14"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linecap="round"
              />
            </svg>
            My Portfolio
          </a>
          <a routerLink="/profile" class="dropdown-item">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.4" />
              <path
                d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linecap="round"
              />
            </svg>
            Settings
          </a>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item logout" (click)="logout()">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path
                d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M11 11l3-3-3-3M14 8H6"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            Sign out
          </button>
        </div>
      </div>

      <!-- Hamburger -->
      <button
        class="hamburger"
        (click)="isMobileOpen = !isMobileOpen"
        [class.open]="isMobileOpen"
        aria-label="Toggle menu"
      >
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div class="mobile-menu" [class.open]="isMobileOpen">
    <a
      *ngFor="let link of navLinks"
      [routerLink]="link.route"
      routerLinkActive="active"
      class="mobile-link"
    >
      {{ link.label }}
    </a>
    <div class="mobile-divider"></div>
    <button class="mobile-logout" (click)="logout()">Sign out</button>
  </div>
</nav>
