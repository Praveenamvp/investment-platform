<div class="auth-page">
  <!-- Decorative background grid -->
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="auth-card">
    <!-- Logo / Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path
            d="M4 20L10 12L16 16L22 6"
            stroke="#059669"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <circle cx="22" cy="6" r="2.5" fill="#059669" />
        </svg>
      </div>
      <span class="brand-name">InvestIQ</span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your portfolio</p>

    <!-- Error message -->
    <div class="error-banner" *ngIf="error">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="7" stroke="#FF6B6B" stroke-width="1.5" />
        <path d="M8 5v4M8 11v.5" stroke="#FF6B6B" stroke-width="1.5" stroke-linecap="round" />
      </svg>
      {{ error }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <!-- Email -->
      <div class="field-group" [class.has-error]="email.invalid && email.touched">
        <label class="field-label">Email address</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect
              x="1"
              y="3"
              width="14"
              height="10"
              rx="2"
              stroke="currentColor"
              stroke-width="1.4"
            />
            <path
              d="M1 5.5l7 4.5 7-4.5"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linecap="round"
            />
          </svg>
          <input
            type="email"
            class="field-input"
            formControlName="email"
            placeholder="you@example.com"
            autocomplete="email"
          />
        </div>
        <span class="field-error" *ngIf="email.hasError('required') && email.touched"
          >Email is required</span
        >
        <span class="field-error" *ngIf="email.hasError('email') && email.touched"
          >Enter a valid email</span
        >
      </div>

      <!-- Password -->
      <div class="field-group" [class.has-error]="password.invalid && password.touched">
        <label class="field-label">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect
              x="3"
              y="7"
              width="10"
              height="7"
              rx="1.5"
              stroke="currentColor"
              stroke-width="1.4"
            />
            <path
              d="M5 7V5a3 3 0 016 0v2"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linecap="round"
            />
          </svg>
          <input
            [type]="showPassword ? 'text' : 'password'"
            class="field-input"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="toggle-pw"
            (click)="showPassword = !showPassword"
            tabindex="-1"
          >
            <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path
                d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"
                stroke="currentColor"
                stroke-width="1.4"
              />
              <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.4" />
            </svg>
            <svg *ngIf="showPassword" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path
                d="M2 2l12 12M6.5 6.6A2 2 0 0010 10M1 8s2.5-5 7-5c.9 0 1.8.2 2.6.5M15 8s-.7 1.4-2 2.6"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
        <span class="field-error" *ngIf="password.hasError('required') && password.touched"
          >Password is required</span
        >
        <span class="field-error" *ngIf="password.hasError('minlength') && password.touched"
          >Minimum 6 characters</span
        >
      </div>

      <!-- Submit -->
      <button type="submit" class="submit-btn" [class.loading]="loading" [disabled]="loading">
        <span class="btn-text" *ngIf="!loading">Sign in</span>
        <span class="btn-loader" *ngIf="loading">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" class="spin">
            <circle cx="9" cy="9" r="7" stroke="rgba(0,0,0,0.3)" stroke-width="2" />
            <path d="M9 2a7 7 0 017 7" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
          </svg>
          Signing in...
        </span>
      </button>
    </form>

    <p class="auth-switch">
      Don't have an account?
      <a routerLink="/auth/register" class="auth-link">Create one</a>
    </p>
  </div>
</div>
